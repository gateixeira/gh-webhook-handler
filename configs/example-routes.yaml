# Example webhook route configuration
#
# Each route defines:
#   - name: unique identifier for the route
#   - sources: which orgs/repos to match (empty repos = all repos in org)
#   - events: which GitHub event types to match
#   - destination: where to forward the event
#   - retry: retry policy for failed deliveries

routes:
  - name: "ci-trigger"
    description: "Forward push and PR events to CI system"
    sources:
      - org: "my-org"
        repos: ["api-service", "web-app"]
    events:
      - push
      - pull_request
    destination:
      url: "https://ci.example.com/github-webhook"
      secret: "$CI_WEBHOOK_SECRET"
      headers:
        X-Source: "gh-webhook-handler"
    retry:
      max_attempts: 5
      backoff: "exponential"

  - name: "security-alerts"
    description: "Forward security events to SIEM"
    sources:
      - org: "my-org"
        repos: []  # all repos
    events:
      - code_scanning_alert
      - dependabot_alert
      - secret_scanning_alert
    destination:
      url: "https://siem.example.com/ingest/github"
      secret: "$SIEM_SECRET"
    retry:
      max_attempts: 10
      backoff: "exponential"
